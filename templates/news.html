{{define "content"}}
<h1 class="section-title">Новости</h1>

<div class="news-grid">
    {{range .News}}
    <div class="news-card">
        <h3>{{.Title}}</h3>
        <p>{{.Content}}</p>
        <p class="news-meta">{{.Author}} — {{.PublishedAt.Format "02.01.2006"}}</p>
    </div>
    {{end}}
</div>

{{if not .News}}
<div class="empty-state">
    <p>Пока нет новостей</p>
</div>
{{end}}

<p class="text-center mt-2" style="color: var(--text-muted); font-size: 0.85rem;">Всего новостей: {{.Total}}</p>
{{end}}
