{{define "layout"}}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script defer src="/static/js/cart.js"></script>
</head>
<body>
    <header class="navbar">
        <div class="navbar-inner">
            <a href="/" class="navbar-brand">☕ Bean &amp; Brew</a>
            <ul class="navbar-links">
                <li><a href="/" {{if eq .Title "Bean & Brew — Кофейный магазин"}}class="active"{{end}}>Главная</a></li>
                <li><a href="/catalog" {{if eq .Title "Каталог — Bean & Brew"}}class="active"{{end}}>Каталог</a></li>
                <li><a href="/news" {{if eq .Title "Новости — Bean & Brew"}}class="active"{{end}}>Новости</a></li>
                {{if .IsAdmin}}<li><a href="/admin/news">Админка</a></li>{{end}}
                <li>
                    {{if .Username}}
                    <a href="/logout" class="btn btn-outline btn-sm">{{.Username}} ↪</a>
                    {{else}}
                    <a href="/login" class="btn btn-outline btn-sm">Войти</a>
                    {{end}}
                </li>
                <li>
                    <a href="/cart" class="cart-link" title="Корзина">🛒<span id="cart-badge" class="cart-badge"></span></a>
                </li>
            </ul>
        </div>
    </header>
    <main class="container">
        {{template "content" .}}
    </main>
    <footer class="site-footer">
        ☕ Bean &amp; Brew Coffee Shop &copy; 2026 | Heisenbug Research Project
    </footer>
    <div id="toast" class="toast"></div>
</body>
</html>
{{end}}
