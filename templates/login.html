{{template "layout" .}}
{{define "content"}}
<div class="form-card">
    <h1>Вход</h1>
    {{if .Error}}<p style="color:#e74c3c;text-align:center;margin-bottom:1rem;">{{.Error}}</p>{{end}}
    <form method="POST" action="/login">
        <div class="form-group">
            <label for="username">Имя пользователя</label>
            <input type="text" id="username" name="username" required placeholder="Ваше имя" autofocus>
        </div>
        <div class="form-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" placeholder="Пароль (для админа: admin)">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Войти</button>
    </form>
    <p class="text-center mt-2" style="font-size:0.85rem;color:var(--text-muted);">
        Демо-режим: введите любое имя. Для админки: admin / admin
    </p>
</div>
{{end}}
