{{define "search_results"}}
{{range .Products}}
<a href="/catalog" class="search-result-item" style="display:block;text-decoration:none;color:inherit;">
    <strong>{{.Name}}</strong>
    <span style="float:right;color:var(--accent);">{{printf "%.0f" .Price}} ₽</span>
    <br><small style="color:var(--text-muted);">{{.Description}}</small>
</a>
{{end}}
{{if not .Products}}
<div class="search-result-item" style="color:var(--text-muted);">Ничего не найдено</div>
{{end}}
{{end}}
