{{define "content"}}
<h1 class="section-title">Каталог</h1>

<div class="category-nav">
    <a href="/catalog" {{if eq .ActiveCategory 0}}class="active"{{end}}>Все</a>
    {{range .Categories}}
    <a href="/catalog?category={{.ID}}" {{if eq $.ActiveCategory .ID}}class="active"{{end}}>{{.Name}}</a>
    {{end}}
</div>

<div class="product-grid" id="product-list">
    {{range .Products}}
    <div class="product-card">
        <div class="product-card-img">{{.ImageURL}}</div>
        <div class="product-card-body">
            <h3>{{.Name}}</h3>
            <p class="desc">{{.Description}}</p>
            <div class="product-card-footer">
                <span class="price">{{printf "%.0f" .Price}} ₽</span>
                <button class="btn btn-primary btn-sm"
                        onclick="addToCart({{.ID}}, '{{.Name}}', {{.Price}}, '{{.ImageURL}}')">
                    В корзину
                </button>
            </div>
        </div>
    </div>
    {{end}}
    {{if not .Products}}
    <div class="empty-state">
        <p>Товары не найдены</p>
    </div>
    {{end}}
</div>

<p class="text-center mt-2" style="color: var(--text-muted); font-size: 0.85rem;">Всего товаров: {{.Total}}</p>
{{end}}
